<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Chinese Capcuters — Brasil</title>
<style>
:root{--g:#00c853;--r:#e53935;--gold:#ffd600;--bg:#0d0d0d;--card:#181818;--bd:#252525;--t:#fff;--mu:#666;--rad:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh;overscroll-behavior:none}
input,button{font-family:inherit;-webkit-appearance:none}

.lang-bar{position:fixed;top:calc(var(--st)+10px);right:14px;z-index:300;display:flex;gap:3px;background:rgba(10,10,10,.9);border:1px solid #2a2a2a;border-radius:20px;padding:3px;backdrop-filter:blur(10px)}
.lb{background:none;border:none;color:var(--mu);padding:4px 10px;border-radius:14px;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;transition:all .2s}
.lb.on{background:#fff;color:#000}

/* SETUP */
#pg-setup{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--st)+60px) 18px calc(var(--sb)+20px)}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:var(--rad);padding:26px 20px;max-width:420px;width:100%}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.logo-img{width:36px;height:36px;border-radius:8px;object-fit:contain}
.logo-name{font-size:19px;font-weight:800;letter-spacing:1px}
.s-h1{font-size:21px;font-weight:800;line-height:1.2;margin-bottom:4px}
.s-sub{color:var(--mu);font-size:12px;margin-bottom:16px}
.host-bdg{display:flex;align-items:center;gap:10px;background:#111;border:1px solid var(--bd);border-radius:10px;padding:10px 13px;margin-bottom:16px}
.hav{width:34px;height:34px;background:linear-gradient(135deg,var(--g),#1de9b6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;flex-shrink:0}
.hname{font-size:13px;font-weight:600}
.hrole{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.flbl{display:block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.finp{width:100%;background:#111;border:1px solid var(--bd);color:#fff;padding:13px 14px;border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:14px}
.finp:focus{border-color:#555}
.cc{background:#111;border:2px solid var(--g);border-radius:12px;padding:14px 10px;text-align:center;background:rgba(0,200,83,.08);margin-bottom:14px}
.cc .flag-img{width:70px;height:44px;object-fit:cover;border-radius:6px;display:block;margin:0 auto 8px}
.cc .cclbl{font-size:15px;font-weight:800;letter-spacing:1px}
.cc .ccsub{font-size:11px;color:var(--mu);margin-top:2px}
.btn-go{width:100%;background:#fff;color:#000;border:none;padding:15px;border-radius:10px;font-size:17px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:opacity .2s;margin-bottom:10px}
.btn-go:active{opacity:.85}
.btn-adm{width:100%;background:none;border:1px solid var(--bd);color:var(--mu);padding:11px;border-radius:10px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.btn-adm:active{border-color:#555;color:#ccc}

/* ADMIN */
#pg-admin{display:none;min-height:100vh;padding:calc(var(--st)+20px) 18px calc(var(--sb)+20px)}
.adm{max-width:540px;margin:0 auto}
.adm h2{font-size:20px;font-weight:800;margin-bottom:4px}
.adm p{color:var(--mu);font-size:13px;margin-bottom:16px}
.pl{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pr{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:9px 12px}
.pn{font-size:16px;font-weight:800;color:#333;min-width:20px}
.pm{flex:1;font-size:14px;font-weight:500}
.ph{font-size:9px;background:var(--g);color:#000;padding:2px 6px;border-radius:3px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.pd{background:none;border:none;color:#444;cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px}
.pd:active{color:var(--r)}
.addr{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.addr input{flex:1;min-width:130px;background:#111;border:1px solid var(--bd);color:#fff;padding:11px 12px;border-radius:9px;font-size:15px;outline:none}
.addr input:focus{border-color:#555}
.btn-add{background:#fff;color:#000;border:none;padding:11px 18px;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer}
.adm-btns{display:flex;gap:8px}
.btn-sv{flex:1;background:var(--g);color:#000;border:none;padding:13px;border-radius:10px;font-size:17px;font-weight:800;cursor:pointer}
.btn-bk{background:var(--card);border:1px solid var(--bd);color:#aaa;padding:13px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

/* APP */
#pg-app{display:none;min-height:100vh;min-height:100dvh;flex-direction:column}
.ahdr{background:rgba(13,13,13,.96);border-bottom:1px solid var(--bd);padding:calc(var(--st)+10px) 14px 10px;position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.ahi{display:flex;align-items:center;justify-content:space-between;gap:7px;flex-wrap:wrap}
.ahl{display:flex;align-items:center;gap:9px}
.capbtn{display:flex;align-items:center;gap:6px;background:#fff;border-radius:7px;padding:5px 10px;border:none;cursor:pointer}
.capbtn:active{opacity:.8}
.capbtn img{width:19px;height:19px;object-fit:contain}
.capbtn span{font-size:14px;font-weight:800;color:#000;letter-spacing:1px}
.ht{font-size:11px;font-weight:700;letter-spacing:.5px;line-height:1.2}
.hs{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.ahr{display:flex;align-items:center;gap:5px}
.nbtn{background:var(--card);border:1px solid var(--bd);color:#aaa;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.nbtn.on{background:#fff;color:#000;border-color:#fff}
.uchip{background:var(--card);border:1px solid var(--bd);color:var(--mu);padding:6px 10px;border-radius:7px;font-size:11px;cursor:pointer;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.abody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 15px calc(var(--sb)+24px)}

/* TOP RATE */
.toprate{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ratebox{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px 18px;text-align:center;min-width:118px}
.ratenum{font-size:40px;font-weight:800;line-height:1;transition:color .4s}
.ratelbl{font-size:10px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.mbar{background:#1e1e1e;border-radius:3px;height:5px;margin-top:8px;overflow:hidden}
.mbarf{height:100%;border-radius:3px;transition:width .5s,background .4s}

/* SECTIONS */
.ssec{margin-bottom:22px}
.sechdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sectitle{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--g)}
.secpct{font-size:18px;font-weight:800}
.secbar{background:#1e1e1e;border-radius:3px;height:4px;margin-bottom:8px;overflow:hidden}
.secbarf{height:100%;border-radius:3px;transition:width .5s,background .3s}
.bdg{display:inline-block;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 9px;margin-bottom:8px}
.b-fail{background:rgba(255,82,82,.13);color:#ff5252;border:1px solid rgba(255,82,82,.3)}
.b-ins{background:rgba(255,171,64,.13);color:#ffab40;border:1px solid rgba(255,171,64,.3)}
.b-atnd{background:rgba(100,181,246,.13);color:#64b5f6;border:1px solid rgba(100,181,246,.3)}
.b-sup{background:rgba(105,240,174,.13);color:#69f0ae;border:1px solid rgba(105,240,174,.3)}


.secquote{font-size:12px;color:#888;font-style:italic;line-height:1.45;margin:2px 0 12px;padding:9px 12px;background:rgba(0,200,83,.04);border-left:2px solid var(--g);border-radius:0 8px 8px 0}

/* CHECK ITEMS */
.ci{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:opacity .15s;-webkit-user-select:none;user-select:none}
.ci:last-child{border-bottom:none}
.ci:active{opacity:.7}
.cbox{width:20px;height:20px;min-width:20px;border:2px solid #333;border-radius:5px;display:flex;align-items:center;justify-content:center;background:#111;transition:all .2s;flex-shrink:0}
.ci.ck .cbox{background:var(--g);border-color:var(--g)}
.cbox svg{width:11px;height:11px;opacity:0;transition:opacity .2s}
.ci.ck .cbox svg{opacity:1}
.cimg{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#222}
.cph{width:44px;height:44px;border-radius:8px;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.ctxt{font-size:14px;line-height:1.3;flex:1}
.ci.ck .ctxt{color:#444;text-decoration:line-through}
.cinput{background:#111;border:1px solid #333;color:#fff;padding:6px 10px;border-radius:7px;font-size:13px;outline:none;width:100%;margin-top:5px;-webkit-appearance:none;display:block}
.cinput:focus{border-color:#555}

/* RANKING */
.rkhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:7px}
.rkhdr h3{font-size:18px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.ldot{width:7px;height:7px;background:var(--g);border-radius:50%;display:inline-block;animation:ld 1.5s infinite;flex-shrink:0}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}
.sum4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.scn{font-size:22px;font-weight:800;line-height:1}
.scl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.rtbl{background:var(--card);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.rrow{display:grid;grid-template-columns:36px 1fr 46px 1fr;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.04);gap:6px}
.rrow:last-child{border-bottom:none}
.rrow.rhdr{background:#111;border-bottom:1px solid var(--bd);padding:7px 13px}
.rrow.rhdr span{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#3a3a3a}
.rrow.mine{background:rgba(0,200,83,.05);border-left:3px solid var(--g)}
.rrow.hrow{background:rgba(255,214,0,.03);border-left:3px solid var(--gold)}
.rpos{font-size:18px;font-weight:800;text-align:center}
.gold{color:var(--gold)}.sil{color:#b8b8b8}.bro{color:#cd8032}
.rname{font-size:13px;font-weight:600;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.ytag{background:var(--g);color:#000;font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;text-transform:uppercase}
.htag{background:var(--gold);color:#000;font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;text-transform:uppercase}
.rpct{font-size:16px;font-weight:800;text-align:right}
.rbarw{display:flex;align-items:center;gap:5px}
.rbar{flex:1;height:4px;background:#1c1c1c;border-radius:2px;overflow:hidden}
.rbarf{height:100%;border-radius:2px;transition:width .5s}


/* ADMIN PANEL */
.ad-lock{max-width:360px;margin:30px auto;text-align:center}
.ad-lock h3{font-size:20px;font-weight:800;margin-bottom:6px}
.ad-lock p{color:var(--mu);font-size:13px;margin-bottom:18px}
.ad-pwd{width:100%;background:#111;border:1px solid var(--bd);color:#fff;padding:13px 14px;border-radius:10px;font-size:16px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px}
.ad-pwd:focus{border-color:var(--g)}
.ad-tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.adt{background:var(--card);border:1px solid var(--bd);color:#aaa;padding:8px 13px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;transition:all .2s}
.adt.on{background:var(--g);color:#000;border-color:var(--g)}
.ad-sec{margin-bottom:18px}
.ad-sec-h{font-size:14px;font-weight:800;margin-bottom:10px;color:var(--g);text-transform:uppercase;letter-spacing:.5px}
/* item editor */
.ie-grp{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:10px}
.ie-grp-h{font-size:13px;font-weight:800;margin-bottom:8px}
.ie-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ie-row:last-child{border-bottom:none}
.ie-row img{width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#222}
.ie-row .ie-ph{width:32px;height:32px;border-radius:6px;background:#222;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ie-inp{flex:1;background:#111;border:1px solid #2a2a2a;color:#fff;padding:7px 10px;border-radius:7px;font-size:13px;outline:none;min-width:0}
.ie-inp:focus{border-color:#555}
.ie-del{background:none;border:none;color:#444;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.ie-del:active{color:var(--r)}
.ie-add{display:flex;gap:6px;margin-top:8px}
.ie-add input{flex:1;background:#111;border:1px solid #2a2a2a;color:#fff;padding:8px 10px;border-radius:7px;font-size:13px;outline:none}
.ie-add button{background:#fff;color:#000;border:none;padding:8px 14px;border-radius:7px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
/* participant progress detail */
.pp-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:13px;margin-bottom:9px}
.pp-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.pp-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pp-pct{font-size:18px;font-weight:800}
.pp-bar{background:#1e1e1e;border-radius:3px;height:5px;overflow:hidden;margin-bottom:8px}
.pp-barf{height:100%;border-radius:3px;transition:width .4s}
.pp-secs{display:flex;flex-wrap:wrap;gap:5px}
.pp-chip{font-size:10px;padding:2px 7px;border-radius:10px;background:#111;border:1px solid #2a2a2a;color:#888}
.pp-chip b{color:#fff}
.pp-del{background:none;border:none;color:#444;cursor:pointer;font-size:16px;padding:2px 6px}
.pp-del:active{color:var(--r)}
/* db export */
.db-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.db-btn{flex:1;min-width:130px;background:var(--card);border:1px solid var(--bd);color:#fff;padding:12px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.db-btn:active{border-color:#555}
.db-btn.danger{border-color:rgba(229,57,53,.4);color:#ff5252}
.db-area{width:100%;min-height:200px;background:#111;border:1px solid var(--bd);color:#0f0;padding:12px;border-radius:9px;font-family:monospace;font-size:11px;outline:none;resize:vertical;white-space:pre;overflow:auto}
.ad-addp{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.ad-addp input{flex:1;min-width:130px;background:#111;border:1px solid var(--bd);color:#fff;padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
.ad-addp button{background:#fff;color:#000;border:none;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer}


/* ════ PRINT TEMPLATE ════ */
#print-area{display:none}
@media print{
  @page{size:A4;margin:12mm 10mm}
  html,body{background:#fff!important;color:#000!important}
  body *{visibility:hidden!important}
  #print-area,#print-area *{visibility:visible!important}
  #print-area{display:block!important;position:absolute;left:0;top:0;width:100%}
  .lang-bar,.ahdr,.toast{display:none!important}
}
.pr-head{text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #000}
.pr-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.pr-logo img{width:30px;height:30px;border-radius:6px}
.pr-logo span{font-size:20px;font-weight:800;letter-spacing:1px;color:#000}
.pr-title{font-size:22px;font-weight:800;color:#000;letter-spacing:.5px}
.pr-sub{font-size:11px;color:#555;margin-top:2px}
.pr-meta{display:flex;justify-content:space-between;font-size:11px;color:#333;margin-top:8px;padding:0 4px}
.pr-meta span{border-bottom:1px solid #999;min-width:120px;padding-bottom:1px}
.pr-sec{margin-bottom:14px;break-inside:avoid;page-break-inside:avoid}
.pr-sec-h{font-size:14px;font-weight:800;color:#000;border-left:4px solid #00a847;padding-left:8px;margin-bottom:3px}
.pr-quote{font-size:10px;font-style:italic;color:#666;margin:2px 0 7px 12px}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px}
.pr-item{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:11px;color:#000;break-inside:avoid}
.pr-chk{width:13px;height:13px;min-width:13px;border:1.4px solid #000;border-radius:3px;display:inline-block}
.pr-img{width:26px;height:26px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid #ddd}
.pr-line{flex:1;border-bottom:1px dotted #ccc;min-height:13px}
.pr-foot{margin-top:14px;text-align:center;font-size:9px;color:#999;border-top:1px solid #ddd;padding-top:6px}

.toast{position:fixed;bottom:calc(var(--sb)+20px);left:50%;transform:translateX(-50%) translateY(10px);background:#1e1e1e;border:1px solid var(--g);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

function enter(){
  var n=document.getElementById('inp').value.trim();

function sts(p){
  if(p<=30)return{l:t('fail'),c:'b-fail'};
  if(p<=50)return{l:t('ins'),c:'b-ins'};
  if(p<=79)return{l:t('meets'),c:'b-atnd'};
  return{l:t('exc'),c:'b-sup'};
}
function pc(p){return p<=30?'#ff5252':p<=50?'#ffab40':p<=79?'#64b5f6':'#69f0ae';}
function isChk(id){return!!(CU&&CU.checks&&CU.checks[id]);}
function gNote(id){return(CU&&CU.notes&&CU.notes[id])||'';}

function getImg(item){
  var el=document.getElementById('img-'+item.id);
  return el?el.src:'';
}

function buildCL(){
  if(!CU)return;
  var tot=0,dn=0;
  for(var si=0;si<STEPS.length;si++)
    for(var ii=0;ii<STEPS[si].items.length;ii++){tot++;if(isChk(STEPS[si].items[ii].id))dn++;}
  var pct=tot>0?Math.round(dn/tot*100):0;
  var st=sts(pct);

  var h='<div class="toprate">';
  h+='<div style="flex:1"><h2 style="font-size:16px;font-weight:800;margin-bottom:3px">🇧🇷 CHECKLIST BRASIL</h2>';
  h+='<p style="color:var(--mu);font-size:11px;margin-bottom:6px">Budget: Unlimited</p>';
  h+='<span class="bdg '+st.c+'" id="mbdg">'+st.l+'</span></div>';
  h+='<div class="ratebox"><div class="ratenum" id="mpct" style="color:'+pc(pct)+'">'+pct+'%</div>';
  h+='<div class="ratelbl">'+t('cr')+'</div>';
  h+='<div class="mbar"><div class="mbarf" id="mbar" style="width:'+pct+'%;background:'+pc(pct)+'"></div></div></div>';
  h+='</div>';

  for(var si=0;si<STEPS.length;si++){
    var s=STEPS[si];var sd=0;
    for(var ii=0;ii<s.items.length;ii++){if(isChk(s.items[ii].id))sd++;}
    var sp=s.items.length>0?Math.round(sd/s.items.length*100):0;
    var ss=sts(sp);

    h+='<div class="ssec">';
    h+='<div class="sechdr"><span class="sectitle">'+s.sec+'</span><span class="secpct" id="sp-'+s.id+'" style="color:'+pc(sp)+'">'+sp+'%</span></div>';
    h+='<div class="secbar"><div class="secbarf" id="sb-'+s.id+'" style="width:'+sp+'%;background:'+pc(sp)+'"></div></div>';
    h+='<span class="bdg '+ss.c+'" id="st-'+s.id+'">'+ss.l+'</span>';
    if(s.quote){h+='<div class="secquote">💡 '+s.quote+'</div>';}

    for(var ii=0;ii<s.items.length;ii++){
      var item=s.items[ii];
      var ck=isChk(item.id);
      var lbl=item.en;
      var imgEl=document.getElementById('img-'+item.id);
      var imgSrc=imgEl?imgEl.src:'';
      var imgH=imgSrc&&imgSrc.length>10
        ?'<img class="cimg" src="'+imgSrc+'" alt="'+lbl+'" loading="lazy">'
        :'<div class="cph">'+item.emoji+'</div>';

      h+='<div class="ci'+(ck?' ck':'')+'" id="ci-'+item.id+'" onclick="tog(\''+item.id+'\')">'+
        '<div class="cbox"><svg viewBox="0 0 10 10" fill="none"><polyline points="1,5.5 4,8.5 9,1.5" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
        imgH+
        '<div style="flex:1"><span class="ctxt">'+lbl+'</span>';
      if(item.hasInput){
        h+='<input class="cinput" id="ni-'+item.id+'" type="text" placeholder="'+(item.ph||'')+'" value="'+esc(gNote(item.id))+'" onclick="event.stopPropagation()" onchange="sNote(\''+item.id+'\',this.value)">';
      }
      h+='</div></div>';
    }
    h+='</div>';
  }
  document.getElementById('v-cl').innerHTML=h;
}

function tog(id){
  if(!CU)return;
  if(!CU.checks)CU.checks={};
  CU.checks[id]=!CU.checks[id];
  saveU();
  var el=document.getElementById('ci-'+id);
  if(el)el.className='ci'+(CU.checks[id]?' ck':'');
  updP();
  toast(CU.checks[id]?(LANG==='zh'?'✓ 已标记':'✓ Checked!'):(LANG==='zh'?'已取消':'Unchecked'));
}
function sNote(id,v){if(!CU)return;if(!CU.notes)CU.notes={};CU.notes[id]=v;saveU();}
function saveU(){var ps=getPs();for(var i=0;i<ps.length;i++){if(ps[i].id===CU.id){ps[i]=CU;break;}}lsS('ps',ps);}

function updP(){
  if(!CU)return;
  var tot=0,dn=0;
  for(var si=0;si<STEPS.length;si++)
    for(var ii=0;ii<STEPS[si].items.length;ii++){tot++;if(isChk(STEPS[si].items[ii].id))dn++;}
  var pct=tot>0?Math.round(dn/tot*100):0;
  var st=sts(pct);
  var pe=document.getElementById('mpct'),pb=document.getElementById('mbar'),mb=document.getElementById('mbdg');
  if(pe){pe.textContent=pct+'%';pe.style.color=pc(pct);}
  if(pb){pb.style.width=pct+'%';pb.style.background=pc(pct);}
  if(mb){mb.className='bdg '+st.c;mb.textContent=st.l;}
  for(var si=0;si<STEPS.length;si++){
    var s=STEPS[si];var sd=0;
    for(var ii=0;ii<s.items.length;ii++){if(isChk(s.items[ii].id))sd++;}
    var sp=s.items.length>0?Math.round(sd/s.items.length*100):0;
    var ss=sts(sp);
    var a=document.getElementById('sp-'+s.id),b=document.getElementById('sb-'+s.id),c=document.getElementById('st-'+s.id);
    if(a){a.textContent=sp+'%';a.style.color=pc(sp);}
    if(b){b.style.width=sp+'%';b.style.background=pc(sp);}
    if(c){c.className='bdg '+ss.c;c.textContent=ss.l;}
  }
}

function upct(u){
  var tot=0,dn=0;
  for(var si=0;si<STEPS.length;si++)
    for(var ii=0;ii<STEPS[si].items.length;ii++){tot++;if(u.checks&&u.checks[STEPS[si].items[ii].id])dn++;}
  return tot>0?Math.round(dn/tot*100):0;
}

function buildRK(){
  if(!CU)return;
  var ps=getPs();
  if(!ps.find(function(p){return p.id===CU.id;}))ps.push(CU);
  var list=ps.map(function(u){return{id:u.id,name:u.name,host:u.host||false,checks:u.checks||{},pct:upct(u)};  });
  list.sort(function(a,b){return b.pct-a.pct;});
  var avg=list.length?Math.round(list.reduce(function(a,u){return a+u.pct;},0)/list.length):0;
  var sup=list.filter(function(u){return u.pct>=80;}).length;
  var medals=['🥇','🥈','🥉'];

  var h='<div class="rkhdr"><h3><span class="ldot"></span>'+t('rank')+'</h3></div>';
  h+='<div class="sum4">';
  h+='<div class="sc"><div class="scn">'+list.length+'</div><div class="scl">'+t('par')+'</div></div>';
  h+='<div class="sc"><div class="scn" style="color:var(--g)">'+avg+'%</div><div class="scl">'+t('avg')+'</div></div>';
  h+='<div class="sc"><div class="scn" style="color:var(--gold)">'+sup+'</div><div class="scl">'+t('esc')+'</div></div>';
  h+='<div class="sc"><div class="scn" style="font-size:17px">'+list.length+' 🇧🇷</div><div class="scl">Brasil</div></div>';
  h+='</div><div class="rtbl">';
  h+='<div class="rrow rhdr"><span>#</span><span>'+t('nm')+'</span><span>%</span><span>'+t('pr')+'</span></div>';
  for(var i=0;i<list.length;i++){
    var u=list[i];var pos=i+1;var me=u.id===CU.id;
    var ps2=pos<=3?medals[pos-1]:pos;
    var pc2=pos===1?'gold':pos===2?'sil':pos===3?'bro':'';
    var st=sts(u.pct);
    h+='<div class="rrow'+(me?' mine':'')+(u.host?' hrow':'')+'">';
    h+='<div class="rpos '+pc2+'">'+ps2+'</div>';
    h+='<div class="rname">'+esc(u.name)+(me?'<span class="ytag">you</span>':'')+(u.host?'<span class="htag">HOST</span>':'')+'</div>';
    h+='<div class="rpct" style="color:'+pc(u.pct)+'">'+u.pct+'%</div>';
    h+='<div class="rbarw"><div class="rbar"><div class="rbarf" style="width:'+u.pct+'%;background:'+pc(u.pct)+'"></div></div></div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('v-rk').innerHTML=h;
}

function adAddP(){
  var inp=document.getElementById('ad-newp');
  var n=inp.value.trim(); if(!n)return;
  var ps=getPs();
  if(ps.find(function(p){return p.name.toLowerCase()===n.toLowerCase();})){toast('Already exists!');return;}
  if(ps.length>=25){toast('Max 25 participants!');return;}
  ps.push({id:Date.now()+'',name:n,checks:{},notes:{}});
  lsS('ps',ps); renderAD(); toast('Added: '+n);
}
function adRenameP(id,val){
  val=val.trim(); if(!val)return;
  var ps=getPs();
  for(var i=0;i<ps.length;i++){if(ps[i].id===id){ps[i].name=val;break;}}
  lsS('ps',ps); toast('Renamed');
}
function adDelP(id){
  lsS('ps',getPs().filter(function(p){return p.id!==id;}));
  renderAD(); toast('Participant removed');
}

// ─── PROGRESS DETAIL ───
function adProgress(){
  var ps=getPs().map(function(u){return{id:u.id,name:u.name,host:u.host,checks:u.checks||{},pct:upct(u)};});
  ps.sort(function(a,b){return b.pct-a.pct;});
  var h='<div class="ad-sec"><div class="ad-sec-h">Detailed Progress per Participant</div>';
  for(var i=0;i<ps.length;i++){
    var u=ps[i];
    var st=sts(u.pct);
    h+='<div class="pp-card">'+
      '<div class="pp-top"><div class="pp-name">'+esc(u.name)+(u.host?'<span class="htag">HOST</span>':'')+'</div>'+
      '<div class="pp-pct" style="color:'+pc(u.pct)+'">'+u.pct+'%</div></div>'+
      '<div class="pp-bar"><div class="pp-barf" style="width:'+u.pct+'%;background:'+pc(u.pct)+'"></div></div>'+
      '<div class="pp-secs">';
    // per-section breakdown
    for(var si=0;si<STEPS.length;si++){
      var s=STEPS[si];var sd=0;
      for(var ii=0;ii<s.items.length;ii++){ if(u.checks[s.items[ii].id])sd++; }
      var sp=s.items.length>0?Math.round(sd/s.items.length*100):0;
      var lbl=s.sec.replace(/^[^ ]+ /,'');
      h+='<span class="pp-chip" style="border-color:'+pc(sp)+'33">'+lbl+': <b style="color:'+pc(sp)+'">'+sp+'%</b></span>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

// ─── DATABASE ───
function adDB(){
  var h='<div class="ad-sec"><div class="ad-sec-h">Database & Export</div>';
  h+='<div class="db-btns">';
  h+='<button class="db-btn" onclick="adExportJSON()">⬇ Export JSON</button>';
  h+='<button class="db-btn" onclick="adExportCSV()">⬇ Export CSV</button>';
  h+='<button class="db-btn" onclick="adShowRaw()">👁 View Raw Data</button>';
  h+='<button class="db-btn danger" onclick="adReset()">🗑 Reset All Data</button>';
  h+='</div>';
  h+='<div class="ad-sec-h" style="font-size:12px">Change Host Password</div>';
  h+='<div class="ad-addp"><input id="ad-pwd-new" placeholder="New password..." type="text"><button onclick="adChangePwd()">Update</button></div>';
  h+='<textarea class="db-area" id="db-area" readonly placeholder="Click View Raw Data to inspect the full database..."></textarea>';
  h+='</div>';
  return h;
}
function adExportJSON(){
  var data={participants:getPs(),steps:STEPS,exportedAt:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  adDownload(blob,'capcuters-data.json'); toast('JSON exported');
}
function adExportCSV(){
  var ps=getPs();
  var rows=['Name,Host,Completion %'];
  ps.map(function(u){return{name:u.name,host:u.host?'Yes':'No',pct:upct(u)};})
    .sort(function(a,b){return b.pct-a.pct;})
    .forEach(function(u){ rows.push('"'+u.name.replace(/"/g,'""')+'",'+u.host+','+u.pct); });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  adDownload(blob,'capcuters-ranking.csv'); toast('CSV exported');
}
function adDownload(blob,name){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
}
function adShowRaw(){
  var data={participants:getPs(),customSteps:lsG('steps_custom')};
  var ta=document.getElementById('db-area');
  if(ta) ta.value=JSON.stringify(data,null,2);
}
function adReset(){
  if(confirm('⚠ This will erase ALL participants, checks and custom items. The host (Luana) will be recreated empty. Continue?')){
    localStorage.removeItem(SK+'ps');
    localStorage.removeItem(SK+'steps_custom');
    STEPS=JSON.parse(JSON.stringify(DEFAULT_STEPS));
    toast('All data reset');
    setTimeout(function(){goBack();},800);
  }
}
function adChangePwd(){
  var v=document.getElementById('ad-pwd-new').value.trim();
  if(!v){toast('Enter a password');return;}
  HOST_PWD=v; lsS('host_pwd',v);
  document.getElementById('ad-pwd-new').value='';
  toast('Password updated');
}

function printChecklist(){
  var logoEl=document.getElementById('img-logo');
  var logoSrc=logoEl?logoEl.src:'';
  var today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  var h='<div class="pr-head">';
  h+='<div class="pr-logo">'+(logoSrc?'<img src="'+logoSrc+'">':'')+'<span>CapCut</span></div>';
  h+='<div class="pr-title">CHINESE CAPCUTERS IN BRAZIL</div>';
  h+='<div class="pr-sub">Confidential Checklist — 25 Participants</div>';
  h+='<div class="pr-meta"><span>Name: '+(CU?esc(CU.name):'')+'</span><span>Date: '+today+'</span><span>Completion Rate: ____%</span></div>';
  h+='</div>';

  for(var si=0;si<STEPS.length;si++){
    var s=STEPS[si];
    h+='<div class="pr-sec"><div class="pr-sec-h">'+esc(s.sec)+'</div>';
    if(s.quote) h+='<div class="pr-quote">💡 '+esc(s.quote)+'</div>';
    h+='<div class="pr-grid">';
    for(var ii=0;ii<s.items.length;ii++){
      var it=s.items[ii];
      var imgEl=document.getElementById('img-'+it.id);
      var imgH=(imgEl&&imgEl.src&&imgEl.src.length>30)
        ?'<img class="pr-img" src="'+imgEl.src+'">'
        :'<span class="pr-img" style="display:inline-flex;align-items:center;justify-content:center;font-size:13px">'+it.emoji+'</span>';
      h+='<div class="pr-item"><span class="pr-chk"></span>'+imgH+'<span>'+esc(it.en)+'</span>';
      if(it.hasInput) h+='<span class="pr-line"></span>';
      h+='</div>';
    }
    h+='</div></div>';
  }

  h+='<div class="pr-foot">CapCut · Chinese Capcuters in Brazil · Host: Luana Zanerato · Generated '+today+'</div>';

  document.getElementById('print-area').innerHTML=h;
  setTimeout(function(){ window.print(); }, 200);
}


function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var _t=null;
function toast(m){
  var el=document.getElementById('toast');
  el.textContent=m;el.classList.add('on');
  clearTimeout(_t);_t=setTimeout(function(){el.classList.remove('on');},2000);
}
